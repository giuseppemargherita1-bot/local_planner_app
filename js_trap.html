<!doctype html>
<html><head><meta charset="utf-8"><title>trap</title>
<script>
window.addEventListener('error', function(e){
  document.body.innerText += '\nERROR:' + e.message + ' @' + e.filename + ':' + e.lineno + ':' + e.colno;
});
window.addEventListener('unhandledrejection', function(e){
  document.body.innerText += '\nREJECTION:' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
});
</script>
</head><body>START<script src="http://127.0.0.1:8765/app.js"></script><script>document.body.innerText += '\nAFTER';</script></body></html>
